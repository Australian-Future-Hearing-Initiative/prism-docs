name: Quarto Publish

on:
  push:
    branches: main

permissions:
  contents: write
  
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch README files
        env:
          # Requires a PAT with 'repo' scope stored as a repository secret
          ORG_PAT: ${{ secrets.ORG_PAT }}
        run: |
          set -euo pipefail

          # Create sibling directories to match local structure
          mkdir -p .deps/prism-setup
          mkdir -p .deps/prism-flutter-backend
          mkdir -p .deps/prism-flutter-web-frontend
          
          # Download single files securely using the token in the header
          # -f = fail on HTTP errors, -S = show errors even with -s
          curl -fsSL -H "Authorization: token $ORG_PAT" \
            "https://raw.githubusercontent.com/Australian-Future-Hearing-Initiative/prism-setup/main/README.md" \
            -o .deps/prism-setup/README.md
            
          curl -fsSL -H "Authorization: token $ORG_PAT" \
            "https://raw.githubusercontent.com/Australian-Future-Hearing-Initiative/prism-flutter-backend/refs/heads/main/README.md" \
            -o .deps/prism-flutter-backend/README.md

          curl -fsSL -H "Authorization: token $ORG_PAT" \
            "https://raw.githubusercontent.com/Australian-Future-Hearing-Initiative/prism-flutter-web-frontend/main/README.md" \
            -o .deps/prism-flutter-web-frontend/README.md

      - name: Debug - Verify fetched files and includes
        run: |
          echo "=== Fetched README files ==="
          find .deps -type f -exec echo "--- {} ---" \; -exec wc -l {} \; -exec head -5 {} \;
          echo ""
          echo "=== Running sync-docs.sh ==="
          bash sync-docs.sh
          echo ""
          echo "=== Generated include files ==="
          for f in guide/_setup_readme.qmd guide/_flutter-backend_readme.qmd guide/_flutter-web-frontend_readme.qmd; do
            echo "--- $f ---"
            if [ -f "$f" ]; then
              echo "Lines: $(wc -l < "$f")"
              head -10 "$f"
            else
              echo "FILE NOT FOUND!"
            fi
            echo ""
          done

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Publish to GitHub Pages (and render)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: .
