name: Quarto Publish

on:
  push:
    branches: main

permissions:
  contents: write
  
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Fetch README files
        env:
          # Requires a PAT with 'repo' scope stored as a repository secret
          ORG_PAT: ${{ secrets.ORG_PAT }}
        run: |
          # Create sibling directories to match local structure
          mkdir -p prism-setup
          mkdir -p prism-flutter-backend
          mkdir -p prism-flutter-web-frontend
          
          # Download single files securely using the token in the header
          curl -sL -H "Authorization: token $ORG_PAT" \
            "https://raw.githubusercontent.com/Australian-Future-Hearing-Initiative/prism-setup/main/README.md" \
            -o prism-setup/README.md
            
          curl -sL -H "Authorization: token $ORG_PAT" \
            "https://raw.githubusercontent.com/Australian-Future-Hearing-Initiative/prism-flutter-backend/main/README.md" \
            -o prism-flutter-backend/README.md

          curl -sL -H "Authorization: token $ORG_PAT" \
            "https://raw.githubusercontent.com/Australian-Future-Hearing-Initiative/prism-flutter-web-frontend/main/README.md" \
            -o prism-flutter-web-frontend/README.md

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Publish to GitHub Pages (and render)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: .
