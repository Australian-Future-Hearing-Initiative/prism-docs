name: Quarto Publish

on:
  push:
    branches: main

permissions:
  contents: write
  
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch README files
        env:
          # Requires a PAT with 'repo' scope stored as a repository secret
          ORG_PAT: ${{ secrets.ORG_PAT }}
        run: |
          set -euo pipefail

          REPOS=(
            "prism-setup"
            "prism-flutter-backend"
            "prism-flutter-web-frontend"
            "prism-wearos-app"
            "prism-ml"
            "vcv-classifier"
            "hp-electric"
            "hp-acoustic"
          )

          ORG="Australian-Future-Hearing-Initiative"
          BASE_DIR=".deps"

          # 2. Loop through the array to create directories and fetch files
          for REPO in "${REPOS[@]}"; do
            echo "Processing $REPO..."

            # Create the target directory
            mkdir -p "$BASE_DIR/$REPO"

            # Download the README
            # Note: Using 'main' as the default branch; change to 'master' if needed.
            curl -fsSL -H "Authorization: token $ORG_PAT" \
              "https://raw.githubusercontent.com/$ORG/$REPO/main/README.md" \
              -o "$BASE_DIR/$REPO/README.md"
          done

      - name: Debug - Verify fetched files and includes
        run: |
          echo "=== Fetched README files ==="
          find .deps -type f -exec echo "--- {} ---" \; -exec wc -l {} \; -exec head -5 {} \;
          echo ""
          echo "=== Running sync-docs.sh ==="
          bash sync-docs.sh
          echo ""
          echo "=== Generated include files ==="
          for f in guide/_setup_readme.qmd guide/_flutter-backend_readme.qmd guide/_flutter-web-frontend_readme.qmd; do
            echo "--- $f ---"
            if [ -f "$f" ]; then
              echo "Lines: $(wc -l < "$f")"
              head -10 "$f"
            else
              echo "FILE NOT FOUND!"
            fi
            echo ""
          done

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Publish to GitHub Pages (and render)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: .
